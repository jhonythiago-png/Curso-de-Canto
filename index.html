<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula de Canto 30 Dias</title>
    <link rel="stylesheet" href="styles.css?v=10">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f1115">
    
    <!-- iOS PWA Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Canto 30">
    
    <!-- App Icons -->
    <link rel="apple-touch-icon" href="assets/icon-192x192.png">
    <link rel="apple-touch-icon" sizes="152x152" href="assets/icon-192x192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/icon-192x192.png">
    <link rel="apple-touch-icon" sizes="167x167" href="assets/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/icon-192x192.png">
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons for modern icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <header class="app-header">
        <div class="logo">
            <i class="ph ph-microphone-stage"></i>
            <h1>Canto 30 Dias</h1>
        </div>
        <p>Transforme sua voz com nossa jornada diária de louvor gospel.</p>
        
        <!-- Gamification: Ofensiva / Streak -->
        <div class="header-actions" style="display: flex; flex-direction: column; align-items: center; gap: 0.5rem; margin-top: 1rem;">
            <div class="streak-container" id="streak-container" style="display: none;">
                <i class="ph-fill ph-fire" style="color: #ff5722; font-size: 1.5rem;"></i>
                <span id="streak-count">0 Dias Seguidos!</span>
            </div>
            
            <button id="btn-wakelock" class="tool-btn" style="background: rgba(255,255,255,0.05); border-radius: 20px;">
                <i class="ph ph-moon"></i> Modo Ao Vivo: Desligado
            </button>
        </div>
    </header>

    <main class="app-content">
        <div class="progress-container">
            <div class="progress-info">
                <span>Seu Progresso</span>
                <span id="progress-text">0/30 Dias</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
        </div>

        <section class="days-grid" id="days-grid">
            <!-- Os dias serão inseridos aqui pelo JavaScript dinamicamente -->
        </section>
    </main>

    <!-- Modal para exibição do conteúdo do dia -->
    <div class="modal-overlay" id="day-modal">
        <div class="modal-content">
            <button class="close-btn" id="close-modal"><i class="ph ph-x"></i></button>
            <div class="modal-header">
                <span class="day-badge" id="modal-day-badge">Dia X</span>
                <h2 id="modal-title">Título da Aula</h2>
            </div>
            
            <div class="modal-scroll-area">
                <div class="modal-body" id="modal-body">
                    <!-- Conteúdo vai aqui -->
                </div>
                
                <!-- Painel de Ferramentas Avançadas -->
                <div class="tools-panel">
                    <!-- Cronômetro -->
                    <div class="tool-section timer-section">
                        <div class="timer-display" id="timer-display">00:00</div>
                        <div class="timer-controls">
                            <button id="btn-timer-add" class="tool-btn"><i class="ph ph-plus"></i> 1 Min</button>
                            <button id="btn-timer-start" class="tool-btn primary"><i class="ph ph-play"></i> Play</button>
                            <button id="btn-timer-reset" class="tool-btn"><i class="ph ph-arrow-counter-clockwise"></i></button>
                        </div>
                    </div>
                    
                    <!-- Gravador de Voz -->
                    <div class="tool-section recorder-section">
                        <button id="btn-record" class="tool-btn record-btn"><i class="ph ph-microphone"></i> <span>Gravar</span></button>
                        <div id="audio-playback-container" class="audio-container" style="display: none;">
                            <audio id="audio-playback" controls></audio>
                            <button id="btn-record-delete" class="tool-btn danger-icon"><i class="ph ph-trash"></i></button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="modal-footer">
                <button class="btn-primary" id="btn-complete-day">
                    <i class="ph ph-check-circle" id="btn-icon"></i> 
                    <span id="btn-text">Concluir Dia</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="data.js?v=10"></script>
    <script src="app.js?v=10"></script>
</body>
</html>
